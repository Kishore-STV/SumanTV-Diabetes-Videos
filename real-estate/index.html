<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Most Reached Videos on Diabetes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#080a0f; --card:#12161f; --border:rgba(255,255,255,0.07);
  --accent:#f5c518; --text:#f0f2f7; --muted:#7a8394;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit';}
.video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;padding:20px;}
.video-card{background:var(--card);padding:10px;border-radius:10px;}
img{width:100%;}
</style>
</head>

<body>

<h1>Diabetes Videos</h1>
<div>Total Views: <span id="totalViews">—</span></div>
<div>Total Videos: <span id="totalVideos">—</span></div>

<div id="loadingState">Loading...</div>
<div class="video-grid" id="videoGrid"></div>

<script>
const CONFIG = {
  API_KEY: "AIzaSyC9BpmOZoTWpxcetXe0lrPPQjWkgqxfYoY",
  VIDEO_IDS: [
  "Zi0WRQy-YUY", "OZ_qAKyCcQw", "lYgB0XoOzJ8", "84dBg7rIvY4", "OKuVk4QWQW0",
  "QCNLJQ6X5LA", "4GlNODqVNhc", "c6b9_nc2lbg", "5jISOgchxng", "5pyUc4BPW5g",
  "drZkyhLoPgY", "S0t5975nHfM", "W3pnrbTGzpM", "Bzg3hSKRAOM", "AHIxaIa6Aps",
  "zStzHrI8pAk", "QJm1u76RwK8", "y8OrgY-ZEAY", "VgJeGa1X9fk", "JohIofdhxtM",
  "Bu7txER-5ZE", "YjYi7vh6Bfg", "oksDqqunGQk", "25BTXwAdGkw", "snMLgYjWP7g",
  "LOJ2NdRL2pQ", "5ge2pZahV8Y", "E8W8I2K2_zE", "uAIXzAOmo6Y", "25a1D_VDJw0",
  "Jv5YH8NI-gs", "wy6vtGP6WHs", "kvwP27NEmNI", "tSFl2xJ68C0", "qdKoOL8B4XA",
  "cdEjy4D9sVg", "EAA8YavCd8w", "FGY2WMJPPto", "lnF8io_ofmU", "BpMWJjABSiM",
  "Ut7EMkl91_Y"
  ],
  CACHE_KEY: 'stv_realestate_v2',
  CACHE_HOURS: 12
};

function fmt(n){
  n=parseInt(n)||0;
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n;
}

function loadCache(){
  try{
    const r=localStorage.getItem(CONFIG.CACHE_KEY);
    if(!r) return null;
    const {ts,data}=JSON.parse(r);
    if((Date.now()-ts)/3600000>CONFIG.CACHE_HOURS) return null;
    if(!data || data.length===0) return null;
    return data;
  }catch{return null;}
}

function saveCache(data){
  if(data && data.length){
    localStorage.setItem(CONFIG.CACHE_KEY,JSON.stringify({ts:Date.now(),data}));
  }
}

async function fetchVideos(ids){
  const all=[];
  for(let i=0;i<ids.length;i+=50){
    const chunk=ids.slice(i,i+50).join(',');
    const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${chunk}&key=${CONFIG.API_KEY}`);
    const j=await res.json();

    if(j.error) throw new Error(j.error.message);
    if(j.items) all.push(...j.items);
  }
  return all;
}

(async()=>{
  try{
    let videos=loadCache();

    if(!videos){
      videos=await fetchVideos(CONFIG.VIDEO_IDS);
      videos.sort((a,b)=>b.statistics.viewCount-a.statistics.viewCount);
      saveCache(videos);
    }

    document.getElementById("loadingState").style.display="none";
    document.getElementById("totalVideos").textContent=videos.length;

    document.getElementById("totalViews").textContent=
      fmt(videos.reduce((s,v)=>s+(+v.statistics.viewCount||0),0));

    const grid=document.getElementById("videoGrid");

    videos.forEach(v=>{
      const div=document.createElement("div");
      div.className="video-card";
      div.innerHTML=`
        <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg">
        <p>${v.snippet.title}</p>
        <p>👁 ${fmt(v.statistics.viewCount)}</p>
      `;
      grid.appendChild(div);
    });

  }catch(e){
    console.error(e);
    document.getElementById("loadingState").innerHTML=`❌ ${e.message}`;
  }
})();
</script>

</body>
</html>
