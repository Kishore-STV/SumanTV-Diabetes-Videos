<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Real Estate Videos - Mega Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#05070a; 
  --card:#11151d; 
  --border:rgba(255,255,255,0.1);
  --accent:#f5c518; 
  --text:#ffffff; 
  --muted:#7a8394;
  --stat-cyan:#00f2ff;
  --gold-a:#f5c518;
  --gold-b:#e8900a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

/* --- PAGE TITLE --- */
.page-title {
  text-align: center;
  font-family: 'Bebas Neue', cursive;
  font-size: 3rem;
  letter-spacing: 2px;
  margin-top: 40px;
  margin-bottom: 0;
  color: var(--text);
}

/* --- HERO DASHBOARD: 80% WIDTH ON MOBILE --- */
.hero-dashboard {
  padding: 30px 0 20px 0;
  display: flex;
  justify-content: center;
}

.stats-container {
  width: 80%;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.stat-box {
  background: #161b25;
  padding: 35px 10px; 
  border-radius: 16px;
  border: 1px solid var(--border);
  flex: 1;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.stat-label {
  display: block;
  color: var(--muted);
  text-transform: uppercase;
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.stat-value {
  font-size: 3rem;
  font-weight: 900;
  color: #ffffff;
  line-height: 1;
}

/* Golden gradient for TOTAL VIEWS hero stat */
#totalViews {
  background: linear-gradient(135deg, var(--gold-a) 0%, var(--gold-b) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* --- VIDEO GRID --- */
.video-grid {
  display: grid;
  grid-template-columns: 1fr; 
  gap: 30px;
  padding: 15px;
  max-width: 1300px;
  margin: 0 auto 100px auto;
}

/* Desktop: 2 per row */
@media (min-width: 992px) {
  .video-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    padding: 30px;
  }
  .stats-container { width: 60%; }
  .stat-value { font-size: 4.5rem; }
  .page-title { font-size: 5rem; }
}

.video-card {
  background: var(--card);
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.thumbnail-container img {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.thumbnail-container iframe {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  border: none;
}

.card-content {
  padding: 25px;
}

.video-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin: 0 0 25px 0;
  line-height: 1.3;
  color: #ffffff;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* --- INDIVIDUAL CARD STATS & WATCH BUTTON --- */
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  gap: 12px;
}

.views-label {
  display: block;
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 800;
}

/* Mobile: tighter size so footer fits on screen */
.views-count {
  font-size: 2.6rem;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--gold-a) 0%, var(--gold-b) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@media (min-width: 992px) {
  .views-count { font-size: 4rem; }
}

.watch-btn {
  background: var(--accent);
  color: #000;
  text-decoration: none;
  padding: 12px 22px;
  border-radius: 50px;
  font-weight: 900;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  flex-shrink: 0;
  cursor: pointer;
  border: none;
}

#loadingState {
  text-align: center;
  padding: 50px;
  font-size: 1.5rem;
  color: var(--muted);
}
</style>
</head>

<body>

<h1 class="page-title">Real Estate Videos</h1>

<div class="hero-dashboard">
  <div class="stats-container">
    <div class="stat-box">
      <span class="stat-label">TOTAL VIDEOS</span>
      <span class="stat-value" id="totalVideos">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">TOTAL VIEWS</span>
      <span class="stat-value" id="totalViews">—</span>
    </div>
  </div>
</div>

<div id="loadingState">Updating Stats...</div>
<div class="video-grid" id="videoGrid"></div>

<script>
const CONFIG = {
  API_KEY: "AIzaSyC9BpmOZoTWpxcetXe0lrPPQjWkgqxfYoY",
  VIDEO_IDS: [
    "Zi0WRQy-YUY", "OZ_qAKyCcQw", "lYgB0XoOzJ8", "84dBg7rIvY4", "OKuVk4QWQW0",
    "QCNLJQ6X5LA", "4GlNODqVNhc", "c6b9_nc2lbg", "5jISOgchxng", "5pyUc4BPW5g",
    "drZkyhLoPgY", "S0t5975nHfM", "W3pnrbTGzpM", "Bzg3hSKRAOM", "AHIxaIa6Aps",
    "zStzHrI8pAk", "QJm1u76RwK8", "y8OrgY-ZEAY", "VgJeGa1X9fk", "JohIofdhxtM",
    "Bu7txER-5ZE", "YjYi7vh6Bfg", "oksDqqunGQk", "25BTXwAdGkw", "snMLgYjWP7g",
    "LOJ2NdRL2pQ", "5ge2pZahV8Y", "E8W8I2K2_zE", "uAIXzAOmo6Y", "25a1D_VDJw0",
    "Jv5YH8NI-gs", "wy6vtGP6WHs", "kvwP27NEmNI", "tSFl2xJ68C0", "qdKoOL8B4XA",
    "cdEjy4D9sVg", "EAA8YavCd8w", "FGY2WMJPPto", "lnF8io_ofmU", "BpMWJjABSiM",
    "Ut7EMkl91_Y"
  ],
  CACHE_KEY: 'stv_realestate_mega_v1',
  CACHE_HOURS: 12
};

/* Indian number format: Lakhs / Crores */
function fmt(n) {
  n = parseInt(n) || 0;
  if (n >= 1e7) return (n / 1e7).toFixed(1).replace(/\.0$/, '') + ' Crores';
  if (n >= 1e5) return Math.round(n / 1e5) + ' Lakhs';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n;
}

function loadCache() {
  try {
    const r = localStorage.getItem(CONFIG.CACHE_KEY);
    if (!r) return null;
    const { ts, data } = JSON.parse(r);
    if ((Date.now() - ts) / 3600000 > CONFIG.CACHE_HOURS) return null;
    return data;
  } catch { return null; }
}

function saveCache(data) {
  if (data && data.length) {
    localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  }
}

async function fetchVideos(ids) {
  const all = [];
  for (let i = 0; i < ids.length; i += 50) {
    const chunk = ids.slice(i, i + 50).join(',');
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${chunk}&key=${CONFIG.API_KEY}`);
    const j = await res.json();
    if (j.items) all.push(...j.items);
  }
  return all;
}

(async () => {
  try {
    let videos = loadCache();
    if (!videos) {
      videos = await fetchVideos(CONFIG.VIDEO_IDS);
      videos.sort((a, b) => b.statistics.viewCount - a.statistics.viewCount);
      saveCache(videos);
    }
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("totalVideos").textContent = videos.length;
    document.getElementById("totalViews").textContent = fmt(videos.reduce((s, v) => s + (+v.statistics.viewCount || 0), 0));

    const grid = document.getElementById("videoGrid");
    videos.forEach(v => {
      const div = document.createElement("div");
      div.className = "video-card";
      div.innerHTML = `
        <div class="thumbnail-container">
          <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="thumbnail">
        </div>
        <div class="card-content">
          <h2 class="video-title">${v.snippet.title}</h2>
          <div class="card-footer">
            <div class="views-stat">
              <span class="views-label">TOTAL VIEWS</span>
              <span class="views-count">${fmt(v.statistics.viewCount)}</span>
            </div>
            <button class="watch-btn">▶ WATCH</button>
          </div>
        </div>
      `;

      /* Inline video play — only on WATCH click */
      div.querySelector('.watch-btn').addEventListener('click', function () {
        const tc = div.querySelector('.thumbnail-container');
        tc.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        this.style.display = 'none'; // hide button after play starts
      });

      grid.appendChild(div);
    });
  } catch (e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
