<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Most Reached Videos on Diabetes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --card: #12161f;
    --border: rgba(255,255,255,0.07);
    --accent: #f5c518;
    --accent2: #ff4d4d;
    --text: #f0f2f7;
    --muted: #7a8394;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

  header { text-align: center; padding: 70px 20px 50px; position: relative; }
  header::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 700px; height: 300px;
    background: radial-gradient(ellipse, rgba(245,197,24,0.1) 0%, transparent 70%); pointer-events: none;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(245,197,24,0.1); border: 1px solid rgba(245,197,24,0.25);
    color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    padding: 6px 16px; border-radius: 100px; margin-bottom: 24px;
  }
  .eyebrow span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,100px); line-height:0.95; letter-spacing:2px; position:relative; z-index:1; }
  h1 em { font-style:normal; color:var(--accent); display:block; }
  .subtitle { margin-top:18px; color:var(--muted); font-size:15px; font-weight:300; max-width:460px; margin-inline:auto; line-height:1.6; position:relative; z-index:1; }

  .stats-row { display:flex; justify-content:center; gap:56px; margin-top:40px; flex-wrap:wrap; }
  .stat { text-align:center; }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--accent); line-height:1; }
  .stat-label { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }

  .divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),rgba(245,197,24,0.3),var(--border),transparent); margin:0 40px; }

  .loading { text-align:center; padding:80px 20px; color:var(--muted); }
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .section-label { display:flex; align-items:center; gap:12px; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
  .section-label::before { content:''; width:28px; height:2px; background:var(--accent); }

  /* Featured */
  .featured-section { padding:50px 40px 20px; max-width:1200px; margin:0 auto; }
  .featured-card { background:var(--card); border:1px solid var(--border); border-radius:18px; overflow:hidden; animation:fadeUp 0.6s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .thumb-wrap { position:relative; width:100%; padding-top:56.25%; background:#000; overflow:hidden; cursor:pointer; }
  .thumb-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s; }
  .thumb-wrap:hover img { transform:scale(1.03); }
  .play-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.2); transition:background 0.2s; }
  .thumb-wrap:hover .play-overlay { background:rgba(0,0,0,0.45); }
  .play-overlay svg { width:72px; height:72px; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.7)); transition:transform 0.2s; }
  .thumb-wrap:hover .play-overlay svg { transform:scale(1.1); }
  .thumb-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
  .dur-badge { position:absolute; bottom:10px; right:12px; background:rgba(0,0,0,0.82); color:#fff; font-size:12px; font-weight:600; padding:2px 8px; border-radius:4px; }

  .featured-info { padding:18px 24px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .feat-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.5px; color:var(--text); line-height:1.2; flex:1; min-width:200px; }
  .feat-stats { display:flex; gap:24px; flex-shrink:0; }
  .feat-stat { text-align:center; }
  .feat-stat-val { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--accent); line-height:1; }
  .feat-stat-key { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .top-badge { background:rgba(255,77,77,0.15); border:1px solid rgba(255,77,77,0.3); color:var(--accent2); font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:3px 10px; border-radius:100px; white-space:nowrap; flex-shrink:0; }

  /* Grid */
  .grid-section { padding:32px 40px 80px; max-width:1200px; margin:0 auto; }
  .video-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }

  .video-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:all 0.25s; animation:fadeUp 0.4s ease both; cursor:pointer; }
  .video-card:hover { border-color:rgba(245,197,24,0.3); transform:translateY(-3px); box-shadow:0 16px 48px rgba(0,0,0,0.5); }

  .card-thumb { position:relative; padding-top:56.25%; overflow:hidden; background:#000; }
  .card-thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
  .video-card:hover .card-thumb img { transform:scale(1.04); }
  .card-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.1); transition:background 0.2s; }
  .video-card:hover .card-play { background:rgba(0,0,0,0.4); }
  .card-play svg { width:42px; height:42px; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8)); transition:transform 0.2s; }
  .video-card:hover .card-play svg { transform:scale(1.12); }
  .card-dur { position:absolute; bottom:7px; right:8px; background:rgba(0,0,0,0.82); color:#fff; font-size:11px; font-weight:600; padding:2px 6px; border-radius:3px; }

  .card-body { padding:10px 12px 13px; }
  .card-title { font-size:13px; font-weight:600; line-height:1.4; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-views { display:inline-flex; align-items:center; gap:5px; background:rgba(245,197,24,0.1); border:1px solid rgba(245,197,24,0.18); color:var(--accent); font-size:10px; font-weight:700; padding:2px 9px; border-radius:100px; margin-top:7px; }

  footer { border-top:1px solid var(--border); text-align:center; padding:28px 20px; color:var(--muted); font-size:12px; }
  footer strong { color:var(--accent); }

  @media(max-width:768px) {
    .featured-section,.grid-section { padding-inline:14px; }
    .video-grid { grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:10px; }
    .featured-info { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow"><span></span> SumanTV Diabetes Videos</div>
  <h1>Most Reached<br><em>Videos on Diabetes</em></h1>
  <p class="subtitle">Content that connected with millions — watch our highest-impact videos right here.</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="totalViews">—</div><div class="stat-label">Total Views</div></div>
    <div class="stat"><div class="stat-num" id="totalVideos">—</div><div class="stat-label">Videos</div></div>
  </div>
</header>

<div class="divider"></div>

<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <p>Loading videos...</p>
</div>

<section class="featured-section" id="featuredSection" style="display:none"></section>

<section class="grid-section" id="gridSection" style="display:none">
  <div class="section-label">All Top Performers</div>
  <div class="video-grid" id="videoGrid"></div>
</section>

<footer>
  Built to showcase <strong>SumanTV Diabetes</strong> — videos that reached millions.
</footer>

<script>
const CONFIG = {
  API_KEY: "AIzaSyCmN_Hhtmh7o9hkd5E6z5RkOBP3hyVugoQ",
  VIDEO_IDS: [
    "dXzrWlF3O4I","6myYSckGH7w","jy8rNWeDorE","Zd_8QZswqAg","H28Cy1sEz8w",
    "BbrnPa1dsd8","qutkOlFRmeU","tFgtGvNFGV0","EW2sTwsEuZA","0oVm4bKTync",
    "pzwbkkIW8Q4","uAQuppH011A","Qu3DhA7SWUM","IH5tMNe8IuY","c_FHHgR5zV4",
    "1oz5Tts-byQ","-ZT8wZTQSog","B4HZ602oMT0","eyRm2aeqxXI","Bf0AnVqxFKg",
    "VkmMxLDoOis","PTxmkE3gVFs","e9kETfGr3lY","wf8HychlCGo","fBEW8B8DO_8",
    "YgmqR5tp0sc","QdzLdYZLZjw","uGt7YOFFNX0","p4LtdA4eJPQ","yikXU5LmEYg",
    "1Oy5KRG6LRw","1apn6JM4x-Q","pP_j7SvCq3g","iQXgdQ_95Mo","XOwoAYEt7bk",
    "aA_ZTg3vcTU","WrYX86SXhU4","qdh9cTgZDzc","3VfaXQ1UD0I","04KE4dwYH0M",
    "7VsKFZ9zbd0","OvgzF_KvEhs","_nEA4BQXGQ8","I3VWxNyTLV0","FFkbk4vRVrE",
    "5gmBqG4aeCE","ho6LZ14ziiA","6W-RdAjxK9s","PoZVlAfHy7o","WHqoRx3C-2E",
    "tc-eScHhYTI","t7985tDmf-w","7aHkt4JWs7Y","TF2cb6F-DQU","wlA5jyk85k8",
    "pOi3dPOfVMk","oFSutz2wCFQ","I8BUpEVKTZw","11QC-pIk50Q","Yp7b691q7P8",
    "Hl9d28KRVUE","iKx3zUEZOhA","mMyA47cZSvE","u1WFxeJGWbs"
  ],
  CACHE_KEY: 'stv_diabetes_v1',
  CACHE_HOURS: 24
};

const playSVG = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="32" fill="rgba(0,0,0,0.6)"/>
  <polygon points="25,18 52,32 25,46" fill="white"/>
</svg>`;

function fmt(n) {
  n = parseInt(n)||0;
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  return n.toLocaleString();
}

function dur(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return '';
  const h=+m[1]||0, mn=+m[2]||0, s=+m[3]||0;
  if(h) return `${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${mn}:${String(s).padStart(2,'0')}`;
}

function thumbUrl(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function embedUrl(id) { return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`; }
function ytLink(id)   { return `https://www.youtube.com/watch?v=${id}`; }

// ── Cache (24h) — API called only once per browser ────────────
function loadCache() {
  try {
    const r = localStorage.getItem(CONFIG.CACHE_KEY);
    if(!r) return null;
    const {ts,data} = JSON.parse(r);
    if((Date.now()-ts)/3600000 > CONFIG.CACHE_HOURS) return null;
    return data;
  } catch { return null; }
}
function saveCache(data) {
  try { localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ts:Date.now(),data})); } catch{}
}

// ── Fetch ─────────────────────────────────────────────────────
async function fetchVideos(ids) {
  const all = [];
  for(let i=0; i<ids.length; i+=50) {
    const chunk = ids.slice(i,i+50).join(',');
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${chunk}&key=${CONFIG.API_KEY}`);
    if(!res.ok) throw new Error(`YouTube API error: ${res.status}`);
    const j = await res.json();
    all.push(...j.items);
  }
  return all;
}

// ── Render ────────────────────────────────────────────────────
function renderFeatured(v) {
  const id = v.id;
  const sec = document.getElementById('featuredSection');
  sec.innerHTML = `
    <div class="section-label">Featured — Most Viewed</div>
    <div class="featured-card">
      <div class="thumb-wrap" id="feat-thumb">
        <img src="${thumbUrl(id)}" alt="${v.snippet.title}" loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${id}/mqdefault.jpg'">
        <div class="play-overlay">${playSVG}</div>
        <div class="dur-badge">${dur(v.contentDetails.duration)}</div>
      </div>
      <div class="featured-info">
        <div class="feat-title">${v.snippet.title}</div>
        <div class="feat-stats">
          <div class="feat-stat"><div class="feat-stat-val">${fmt(v.statistics.viewCount)}</div><div class="feat-stat-key">Views</div></div>
          <div class="feat-stat"><div class="feat-stat-val">${dur(v.contentDetails.duration)}</div><div class="feat-stat-key">Duration</div></div>
        </div>
        <div class="top-badge">🔥 Top Video</div>
      </div>
    </div>`;

  document.getElementById('feat-thumb').addEventListener('click', () => {
    document.getElementById('feat-thumb').innerHTML =
      `<iframe src="${embedUrl(id)}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  });
  sec.style.display = 'block';
}

function renderGrid(videos) {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = '';
  videos.forEach((v, i) => {
    const id = v.id;
    const card = document.createElement('div');
    card.className = 'video-card';
    card.style.animationDelay = `${Math.min(i*0.04,0.8)}s`;
    card.innerHTML = `
      <div class="card-thumb">
        <img src="${thumbUrl(id)}" alt="${v.snippet.title}" loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${id}/mqdefault.jpg'">
        <div class="card-play">${playSVG}</div>
        <div class="card-dur">${dur(v.contentDetails.duration)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${v.snippet.title}</div>
        <div class="card-views">👁 ${fmt(v.statistics.viewCount)}</div>
      </div>`;
    card.addEventListener('click', () => window.open(ytLink(id), '_blank'));
    grid.appendChild(card);
  });
  document.getElementById('gridSection').style.display = 'block';
}

function renderStats(videos) {
  const total = videos.reduce((s,v)=>s+(parseInt(v.statistics.viewCount)||0),0);
  document.getElementById('totalViews').textContent  = fmt(total);
  document.getElementById('totalVideos').textContent = videos.length;
}

// ── Main ──────────────────────────────────────────────────────
(async () => {
  try {
    const ids = CONFIG.VIDEO_IDS.filter(id=>id&&!id.startsWith('VIDEO_ID'));
    if(!ids.length) throw new Error('No video IDs configured.');

    let videos = loadCache();
    if(!videos) {
      // API called ONCE — result cached for 24 hours
      videos = await fetchVideos(ids);
      videos.sort((a,b)=>(parseInt(b.statistics.viewCount)||0)-(parseInt(a.statistics.viewCount)||0));
      saveCache(videos);
    }

    document.getElementById('loadingState').style.display = 'none';
    renderStats(videos);
    renderFeatured(videos[0]);
    if(videos.length>1) renderGrid(videos.slice(1));

  } catch(err) {
    document.getElementById('loadingState').innerHTML = `
      <div style="color:var(--accent2);font-size:15px;">
        ⚠️ ${err.message}<br>
        <span style="color:var(--muted);font-size:13px;margin-top:8px;display:block;">
          Check your API_KEY in the CONFIG section.
        </span>
      </div>`;
  }
})();
</script>
</body>
</html>
