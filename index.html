<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SumanTV Network | Video Portfolios</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #080a0f; --card: #12161f; --border: rgba(255,255,255,0.1); --accent: #f5c518; --text: #f0f2f7; --muted: #7a8394; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }
  header { text-align: center; padding: 80px 20px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 70px; line-height: 1; margin-bottom: 10px; }
  h1 span { color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 20px; }
  .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px 20px; text-decoration: none; transition: 0.3s; }
  .box:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(245,197,24,0.05); }
  .icon { font-size: 40px; margin-bottom: 15px; display: block; }
  .box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); }
  .box p { color: var(--muted); font-size: 14px; margin-top: 5px; }
</style>
</head>
<body>
<header>
  <h1>SumanTV <span>Network</span></h1>
  <p>Official Video Portfolios & Viewership Data</p>
</header>
<main class="grid">
  <a href="/diabetes" class="box">
    <span class="icon">🩺</span>
    <h2>Diabetes</h2>
    <p>Health & Wellness Portfolio</p>
  </a>
  <a href="/real-estate" class="box">
    <span class="icon">🏗️</span>
    <h2>Real Estate</h2>
    <p>Venture & Property Showcases</p>
  </a>
  <a href="#" class="box" style="opacity: 0.5;">
    <span class="icon">💎</span>
    <h2>Jewelry</h2>
    <p>Coming Soon</p>
  </a>
  <a href="#" class="box" style="opacity: 0.5;">
    <span class="icon">🛍️</span>
    <h2>Shopping Malls</h2>
    <p>Coming Soon</p>
  </a>
</main>
</body>
</html>
