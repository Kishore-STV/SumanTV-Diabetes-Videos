<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Videos on Diabetes - Mega Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#05070a; 
  --card:#11151d; 
  --border:rgba(255,255,255,0.1);
  --accent:#f5c518; 
  --text:#ffffff; 
  --muted:#7a8394;
  --stat-cyan:#00f2ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

/* --- MAIN TITLE --- */
.page-title {
  text-align: center;
  font-family: 'Bebas Neue', cursive;
  font-size: 3rem;
  letter-spacing: 2px;
  margin-top: 40px;
  margin-bottom: 0;
  color: var(--text);
}

/* --- HERO DASHBOARD: 80% WIDTH ON MOBILE --- */
.hero-dashboard {
  padding: 30px 0 20px 0;
  display: flex;
  justify-content: center;
}

.stats-container {
  width: 80%; /* Occupies exactly 80% of mobile screen width */
  display: flex;
  justify-content: center;
  gap: 15px;
}

.stat-box {
  background: #161b25;
  padding: 35px 10px; 
  border-radius: 16px;
  border: 1px solid var(--border);
  flex: 1;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.stat-label {
  display: block;
  color: var(--muted);
  text-transform: uppercase;
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.stat-value {
  font-size: 3rem; /* Extra large header stats */
  font-weight: 900;
  color: #ffffff;
  line-height: 1;
}

/* --- VIDEO GRID --- */
.video-grid {
  display: grid;
  grid-template-columns: 1fr; 
  gap: 30px;
  padding: 15px;
  max-width: 1300px;
  margin: 0 auto 100px auto;
}

/* Desktop: 2 per row */
@media (min-width: 992px) {
  .video-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    padding: 30px;
  }
  .stats-container { width: 60%; }
  .stat-value { font-size: 4.5rem; }
  .page-title { font-size: 5rem; }
}

.video-card {
  background: var(--card);
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.thumbnail-container img {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.card-content {
  padding: 25px;
}

.video-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin: 0 0 25px 0;
  line-height: 1.3;
  color: #ffffff;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* --- INDIVIDUAL CARD STATS & WATCH BUTTON --- */
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.views-label {
  display: block;
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 800;
}

.views-count {
  font-size: 4.5rem; /* Massive mobile card stats */
  font-weight: 900;
  color: var(--stat-cyan);
  line-height: 1;
  letter-spacing: -2px;
}

.watch-btn {
  background: var(--accent);
  color: #000;
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 900;
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

#loadingState {
  text-align: center;
  padding: 50px;
  font-size: 1.5rem;
  color: var(--muted);
}
</style>
</head>

<body>

<h1 class="page-title">Videos on Diabetes</h1>

<div class="hero-dashboard">
  <div class="stats-container">
    <div class="stat-box">
      <span class="stat-label">TOTAL VIDEOS</span>
      <span class="stat-value" id="totalVideos">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">TOTAL VIEWS</span>
      <span class="stat-value" id="totalViews">—</span>
    </div>
  </div>
</div>

<div id="loadingState">Updating Stats...</div>
<div class="video-grid" id="videoGrid"></div>

<script>
const CONFIG = {
  API_KEY: "AIzaSyC9BpmOZoTWpxcetXe0lrPPQjWkgqxfYoY",
  VIDEO_IDS: ["dXzrWlF3O4I","6myYSckGH7w","jy8rNWeDorE","Zd_8QZswqAg","H28Cy1sEz8w","BbrnPa1dsd8","qutkOlFRmeU","tFgtGvNFGV0","EW2sTwsEuZA","0oVm4bKTync","pzwbkkIW8Q4","uAQuppH011A","Qu3DhA7SWUM","IH5tMNe8IuY","c_FHHgR5zV4","1oz5Tts-byQ","-ZT8wZTQSog","B4HZ602oMT0","eyRm2aeqxXI","Bf0AnVqxFKg","VkmMxLDoOis","PTxmkE3gVFs","e9kETfGr3lY","wf8HychlCGo","fBEW8B8DO_8","YgmqR5tp0sc","QdzLdYZLZjw","uGt7YOFFNX0","p4LtdA4eJPQ","yikXU5LmEYg","1Oy5KRG6LRw","1apn6JM4x-Q","pP_j7SvCq3g","iQXgdQ_95Mo","XOwoAYEt7bk","aA_ZTg3vcTU","WrYX86SXhU4","qdh9cTgZDzc","3VfaXQ1UD0I","04KE4dwYH0M","7VsKFZ9zbd0","OvgzF_KvEhs","_nEA4BQXGQ8","I3VWxNyTLV0","FFkbk4vRVrE","5gmBqG4aeCE","ho6LZ14ziiA","6W-RdAjxK9s","PoZVlAfHy7o","WHqoRx3C-2E","tc-eScHhYTI","t7985tDmf-w","7aHkt4JWs7Y","TF2cb6F-DQU","wlA5jyk85k8","pOi3dPOfVMk","oFSutz2wCFQ","I8BUpEVKTZw","11QC-pIk50Q","Yp7b691q7P8","Hl9d28KRVUE","iKx3zUEZOhA","mMyA47cZSvE","u1WFxeJGWbs"],
  CACHE_KEY: "diabetes_vmax_final",
  CACHE_HOURS: 12
};

function fmt(n){
  n=parseInt(n)||0;
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n;
}

function loadCache(){
  try{
    const r=localStorage.getItem(CONFIG.CACHE_KEY);
    if(!r) return null;
    const {ts,data}=JSON.parse(r);
    if((Date.now()-ts)/3600000>CONFIG.CACHE_HOURS) return null;
    return data;
  }catch{return null;}
}

function saveCache(data){
  if(data && data.length){
    localStorage.setItem(CONFIG.CACHE_KEY,JSON.stringify({ts:Date.now(),data}));
  }
}

async function fetchVideos(ids){
  const all=[];
  for(let i=0;i<ids.length;i+=50){
    const chunk=ids.slice(i,i+50).join(',');
    const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${chunk}&key=${CONFIG.API_KEY}`);
    const j=await res.json();
    if(j.items) all.push(...j.items);
  }
  return all;
}

(async()=>{
  try{
    let videos=loadCache();
    if(!videos){
      videos=await fetchVideos(CONFIG.VIDEO_IDS);
      videos.sort((a,b)=>b.statistics.viewCount-a.statistics.viewCount);
      saveCache(videos);
    }
    document.getElementById("loadingState").style.display="none";
    document.getElementById("totalVideos").textContent=videos.length;
    document.getElementById("totalViews").textContent=fmt(videos.reduce((s,v)=>s+(+v.statistics.viewCount||0),0));

    const grid=document.getElementById("videoGrid");
    videos.forEach(v=>{
      const div=document.createElement("div");
      div.className="video-card";
      div.innerHTML = `
        <div class="thumbnail-container">
          <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="thumbnail">
        </div>
        <div class="card-content">
          <h2 class="video-title">${v.snippet.title}</h2>
          <div class="card-footer">
            <div class="views-stat">
              <span class="views-label">TOTAL VIEWS</span>
              <span class="views-count">${fmt(v.statistics.viewCount)}</span>
            </div>
            <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" class="watch-btn">▶ WATCH</a>
          </div>
        </div>
      `;
      grid.appendChild(div);
    });
  }catch(e){
    console.error(e);
  }
})();
</script>
</body>
</html>
