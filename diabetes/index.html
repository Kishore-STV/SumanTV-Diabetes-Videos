<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Health & Diabetes Portfolio - SumanTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@400;700;800;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  /* RICH MAROON THEME */
  --bg-dark:     #2A0815; 
  --bg-light:    #4D0E26;
  --brand-main:  #bf0064; 
  --brand-accent:#FF1D58; 
  --brand-grad:  linear-gradient(135deg, #FF7EB3, #FF1D58);
  
  --text:        #FFFFFF; 
  --muted:       #FFB3C6; 
  --body:        #E2E8F0;
  --border:      rgba(255, 255, 255, 0.1); 
  
  /* VIDEO CARD THEME */
  --card-bg:     rgba(20, 3, 8, 0.4); 
  --card-border: rgba(255, 255, 255, 0.08);
  
  /* CARD STATS FOOTER */
  --footer-bg:   rgba(0, 0, 0, 0.25);
  --footer-text: #FFFFFF; 
  --footer-muted:#FFB3C6; 
  
  --shadow-md:   0 12px 32px rgba(0,0,0,0.3);
  --shadow-card: 0 16px 40px rgba(0,0,0,0.5);
}

body {
  background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #6A1A3A; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--brand-accent); }
::selection { background: rgba(255,29,88,0.3); color: #FFF; }

.mesh {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.mesh-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.25; 
  animation: drift 25s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
}

.mesh-orb:nth-child(1) { width: 40vmax; height: 40vmax; background: var(--brand-main); top: -10%; left: -5%; }
.mesh-orb:nth-child(2) { width: 35vmax; height: 35vmax; background: var(--brand-accent); top: 20%; right: -5%; animation-delay: -7s; }

@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(3vw, 5vh) scale(1.05); }
  100% { transform: translate(-2vw, 8vh) scale(1.15); }
}

.hero {
  position: relative;
  z-index: 1;
  padding: 100px 24px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #FFF;
  margin-bottom: 24px;
  padding: 8px 20px;
  border-radius: 100px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
}

.hero-eyebrow .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--brand-accent);
  box-shadow: 0 0 10px var(--brand-accent);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -1px;
  color: var(--text);
  margin: 0 0 16px 0;
}

.page-title em {
  background: var(--brand-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-style: italic;
  font-weight: 600;
}

.hero-sub {
  font-size: clamp(15px, 2vw, 18px);
  color: var(--body);
  max-width: 500px;
  margin: 0 auto 48px;
  line-height: 1.6;
}

/* ─── DASHBOARD STATS ─── */
.hero-dashboard {
  width: 100%;
  max-width: 900px;
  background: rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px;
  box-shadow: var(--shadow-md);
  margin-bottom: 40px;
}

.stats-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

.stat-box { flex: 1; text-align: center; }

.stat-label {
  display: block;
  text-transform: uppercase;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2.5px;
  margin-bottom: 12px;
  background: var(--brand-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-value {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(48px, 12vw, 72px);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -2px;
  color: #FFFFFF;
}

.stat-divider {
  width: 1px;
  height: 80px;
  background: var(--border);
}

@media (max-width: 768px) {
  .stats-container { flex-direction: column; gap: 30px; }
  .stat-divider { width: 100px; height: 1px; }
  .hero-dashboard { padding: 30px 20px; }
}

/* ─── VIDEO GRID & CARDS ─── */
.video-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  padding: 24px;
  max-width: 1320px;
  margin: 0 auto 100px auto;
  position: relative;
  z-index: 1;
}

@media (min-width: 992px) {
  .video-grid { grid-template-columns: repeat(2, 1fr); gap: 40px; padding: 40px; }
}

.video-card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-card);
  transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s;
  display: flex;
  flex-direction: column;
}

.video-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.8);
  border-color: rgba(255, 29, 88, 0.4);
}

/* ─── MAGIC PIP UNLOCKER ─── */
.video-card.has-pip {
  transform: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  overflow: visible !important;
  z-index: 9999;
}

/* ─── FLAWLESS PiP STRUCTURE ─── */
.thumbnail-wrapper {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
  position: relative;
}

.thumbnail-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  border-radius: 24px 24px 0 0;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.video-frame {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: inherit;
  overflow: hidden;
  background: #000;
}

.video-frame img, .video-frame iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  border: none;
}

/* PiP ACTIVE STATE */
.thumbnail-container.is-pip {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 320px;
  height: 180px; 
  z-index: 9999;
  border-radius: 12px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 2px var(--brand-accent); 
  background: #000;
  box-sizing: content-box; 
}

.pip-close-btn {
  display: none;
  position: absolute;
  top: -12px;
  left: -12px;
  width: 30px;
  height: 30px;
  background: var(--brand-accent);
  color: #FFF;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

.thumbnail-container.is-pip .pip-close-btn {
  display: flex;
}

@media (max-width: 768px) {
  .thumbnail-container.is-pip {
    width: 240px;
    height: 135px; 
    bottom: 16px;
    right: 16px;
  }
}

.card-content { 
  padding: 16px 24px 0 24px; 
  flex-grow: 1;
  display: flex;
  flex-direction: column;
}

.video-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.05rem; 
  font-weight: 600;
  margin: 0 0 16px 0; 
  line-height: 1.4;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── STRICT 70/30 FOOTER SPLIT ─── */
.card-footer {
  background: var(--footer-bg);
  margin: auto -24px 0 -24px; 
  padding: 20px 24px; 
  border-radius: 0 0 24px 24px; 
  display: flex;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,0.05); 
  box-sizing: border-box;
}

.views-stat {
  flex: 0 0 70%;
  width: 70%; 
  display: flex;
  flex-direction: column;
  padding-right: 15px; 
  box-sizing: border-box;
  overflow: hidden;
}

.views-label {
  display: block;
  font-family: 'Syne', sans-serif;
  font-size: clamp(11px, 2.5vw, 13px);
  color: var(--footer-muted);
  text-transform: uppercase;
  font-weight: 800;
  letter-spacing: 1.5px;
  margin-bottom: 2px;
}

.views-count {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(34px, 9vw, 48px); 
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
  color: var(--footer-text); 
  white-space: nowrap; 
}

.watch-btn {
  flex: 0 0 30%;
  width: 30%; 
  background: var(--brand-grad); 
  color: #000000; 
  padding: 16px 4px; 
  border-radius: 100px;
  font-family: 'Syne', sans-serif;
  font-weight: 900; 
  font-size: clamp(12px, 3vw, 16px); 
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  border: none;
  box-sizing: border-box;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.watch-btn:hover {
  box-shadow: 0 8px 20px rgba(255, 29, 88, 0.4);
  transform: translateY(-2px);
}

.play-icon {
  font-size: 0.9em;
  margin-right: 6px;
  padding-bottom: 2px;
}

#loadingState { text-align: center; padding: 50px; font-size: 1.2rem; font-weight: 700; color: var(--muted); }
#errorState { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--brand-accent); display: none; }
</style>
</head>
<body>

<div class="mesh" aria-hidden="true">
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
</div>

<section class="hero">
  <div class="hero-eyebrow">
    <span class="dot"></span>
    Content Portfolio
  </div>
  
  <h1 class="page-title">Health & <em>Diabetes</em></h1>
  <p class="hero-sub">Real-time viewership analytics and video performance dashboard.</p>
  
  <div class="hero-dashboard">
    <div class="stats-container">
      <div class="stat-box">
        <span class="stat-label">Total Videos</span>
        <span class="stat-value" id="totalVideos">—</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-box">
        <span class="stat-label">Network Views</span>
        <span class="stat-value" id="totalViews">—</span>
      </div>
    </div>
  </div>
</section>

<div id="loadingState">Syncing Live Data...</div>
<div id="errorState">Could not connect to SumanTV servers. Please try again.</div>
<div class="video-grid" id="videoGrid"></div>

<script>
// ─── ONLY THESE 2 LINES CHANGE PER PAGE ────────────────────
const GAS_URL   = "https://script.google.com/macros/s/AKfycby_i4pPRCJDscJ3JiVWuc2bHdPf1xXahwyLzOWHkxot-E5UgmntTwOi3xdYtEZXeCRW/exec";
const PAGE_NAME = "diabetes";
// ───────────────────────────────────────────────────────────

function fmt(n) {
  n = parseInt(n) || 0;
  if (n >= 1e7) return parseFloat((n / 1e7).toFixed(2)) + ' Crores';
  if (n >= 1e5) return parseFloat((n / 1e5).toFixed(2)) + ' Lakhs';
  if (n >= 1e3) return parseFloat((n / 1e3).toFixed(1)) + 'K';
  return n;
}

(async () => {
  try {
    const res = await fetch(`${GAS_URL}?page=${PAGE_NAME}`);
    const videos = await res.json();

    if (!Array.isArray(videos) || videos.length === 0) throw new Error("No data");

    document.getElementById("loadingState").style.display = "none";
    document.getElementById("totalVideos").textContent = videos.length;
    document.getElementById("totalViews").textContent = fmt(
      videos.reduce((s, v) => s + (parseInt(v.viewCount) || 0), 0)
    );

    const grid = document.getElementById("videoGrid");
    
    // ─── SEAMLESS CSS-BASED PiP ENGINE ───
    let activeCard = null;
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const wrapper = entry.target;
        const card = wrapper.closest('.video-card');
        
        if (!activeCard || card !== activeCard) return;

        const tc = activeCard.querySelector('.thumbnail-container');

        if (!entry.isIntersecting) {
          tc.classList.add('is-pip'); 
          activeCard.classList.add('has-pip'); 
        } else {
          tc.classList.remove('is-pip'); 
          activeCard.classList.remove('has-pip'); 
        }
      });
    }, { threshold: 0 }); 

    function stopActiveVideo() {
      if (activeCard) {
        observer.unobserve(activeCard.querySelector('.thumbnail-wrapper')); 
        
        const id = activeCard.dataset.videoId;
        const vf = activeCard.querySelector('.video-frame');
        const btn = activeCard.querySelector('.watch-btn');
        
        vf.innerHTML = `<img src="https://i.ytimg.com/vi/${id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${id}/hqdefault.jpg'" alt="thumbnail">`;
        
        activeCard.querySelector('.thumbnail-container').classList.remove('is-pip');
        activeCard.classList.remove('has-pip'); 
        
        btn.style.display = 'flex';
        activeCard.classList.remove('playing');
        activeCard = null;
      }
    }

    // ─── GENERATE CARDS ───
    videos.forEach(v => {
      const div = document.createElement("div");
      div.className = "video-card";
      div.dataset.videoId = v.id; 
      
      div.innerHTML = `
        <div class="thumbnail-wrapper">
          <div class="thumbnail-container">
            <div class="video-frame">
              <img src="https://i.ytimg.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${v.id}/hqdefault.jpg'" alt="thumbnail">
            </div>
            <button class="pip-close-btn">&times;</button>
          </div>
        </div>
        <div class="card-content">
          <h2 class="video-title">${v.title}</h2>
          <div class="card-footer">
            <div class="views-stat">
              <span class="views-label">TOTAL VIEWS</span>
              <span class="views-count">${fmt(v.viewCount)}</span>
            </div>
            <button class="watch-btn">
              <span class="play-icon">&#9654;</span> Watch
            </button>
          </div>
        </div>
      `;

      div.querySelector('.pip-close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        stopActiveVideo();
      });

      div.querySelector('.watch-btn').addEventListener('click', function () {
        
        stopActiveVideo();

        activeCard = div;
        const vf = div.querySelector('.video-frame');
        
        vf.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1&modestbranding=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        
        this.style.display = 'none';
        div.classList.add('playing');
        
        observer.observe(div.querySelector('.thumbnail-wrapper'));
      });

      grid.appendChild(div);
    });

  } catch (e) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    console.error(e);
  }
})();
</script>
</body>
</html>
